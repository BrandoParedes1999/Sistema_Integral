    <!-- Script principal de gestión de alumnos -->
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let totalRegistros = 0;

        function actualizarExportUrl() {
            const b = encodeURIComponent(document.getElementById("busqueda").value);
            const f = document.getElementById("idfacultades").value;
            const s = document.getElementById("sexoFiltro").value;
            document.getElementById("btn-exportar").href =
                `exportar-excel.php?busqueda=${b}&facultad=${f}&sexo=${s}`;
        }

        function cargarAlumnos() {
            const busqueda = document.getElementById("busqueda").value;
            const facultad = document.getElementById("idfacultades").value;
            const sexo = document.getElementById("sexoFiltro").value;
            actualizarExportUrl();

            // Mostrar indicador de carga
            document.getElementById('tablaAlumnos').innerHTML = `
                <tr>
                    <td colspan="6" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-2 mb-0">Cargando datos...</p>
                    </td>
                </tr>
            `;

            // Cargar datos de la página actual
            fetch(`Listado.php?pagina=${currentPage}&busqueda=${encodeURIComponent(busqueda)}&facultad=${facultad}&sexo=${sexo}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error en la respuesta del servidor');
                    }
                    return response.text();
                })
                .then(data => {
                    const tabla = document.getElementById('tablaAlumnos');
                    
                    if (data.trim() === '' || data.includes('No se encontraron') || data.includes('empty-state')) {
                        tabla.innerHTML = `
                            <tr>
                                <td colspan="6" class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>No se encontraron alumnos con los criterios de búsqueda</p>
                                </td>
                            </tr>
                        `;
                        totalPages = 0;
                        actualizarPaginacionHTML();
                    } else {
                        tabla.innerHTML = data;
                        // Obtener el total de páginas después de cargar los datos
                        actualizarPaginacion(busqueda, facultad, sexo);
                    }
                })
                .catch(error => {
                    console.error('Error al cargar los alumnos:', error);
                    document.getElementById('tablaAlumnos').innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center py-4 text-danger">
                                <i class="bi bi-exclamation-triangle fs-2"></i>
                                <p class="mt-2">Error al cargar los datos. Por favor, intente nuevamente.</p>
                            </td>
                        </tr>
                    `;
                });
        }

        function actualizarPaginacion(busqueda, facultad, sexo) {
            // Obtener el total de registros desde el servidor
            fetch(`Listado.php?total=1&busqueda=${encodeURIComponent(busqueda)}&facultad=${facultad}&sexo=${sexo}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Error:', data.error);
                        return;
                    }
                    
                    totalRegistros = data.total_registros;
                    totalPages = data.total_paginas;
                    
                    actualizarPaginacionHTML();
                })
                .catch(error => {
                    console.error('Error al obtener total de páginas:', error);
                });
        }

        function actualizarPaginacionHTML() {
            let paginacionHTML = "";
            
            if (totalPages > 1) {
                // Información de registros
                const inicio = ((currentPage - 1) * 20) + 1;
                const fin = Math.min(currentPage * 20, totalRegistros);
                
                paginacionHTML += `<div class="pagination-info mb-3">
                    Mostrando <strong>${inicio}</strong> a <strong>${fin}</strong> de <strong>${totalRegistros}</strong> alumnos
                </div>
                <div class="pagination-buttons">`;
                
                // Botón primera página
                if (currentPage > 1) {
                    paginacionHTML += `<button class="btn-pagination" onclick="cambiarPagina(1)" title="Primera página">
                        <i class="bi bi-chevron-double-left"></i>
                    </button>`;
                }
                
                // Botón anterior
                if (currentPage > 1) {
                    paginacionHTML += `<button class="btn-pagination" onclick="cambiarPagina(${currentPage - 1})" title="Página anterior">
                        <i class="bi bi-chevron-left"></i>
                    </button>`;
                }
                
                // Números de página con lógica mejorada
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, currentPage + 2);
                
                // Ajustar si estamos cerca del inicio
                if (currentPage <= 3) {
                    endPage = Math.min(5, totalPages);
                }
                
                // Ajustar si estamos cerca del final
                if (currentPage >= totalPages - 2) {
                    startPage = Math.max(1, totalPages - 4);
                }
                
                // Primera página si no está en el rango
                if (startPage > 1) {
                    paginacionHTML += `<button class="btn-pagination" onclick="cambiarPagina(1)">1</button>`;
                    if (startPage > 2) {
                        paginacionHTML += `<span class="btn-pagination pagination-dots">...</span>`;
                    }
                }
                
                // Páginas en el rango
                for (let i = startPage; i <= endPage; i++) {
                    paginacionHTML += `<button class="btn-pagination ${i === currentPage ? 'active' : ''}" 
                                              onclick="cambiarPagina(${i})">${i}</button>`;
                }
                
                // Última página si no está en el rango
                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        paginacionHTML += `<span class="btn-pagination pagination-dots">...</span>`;
                    }
                    paginacionHTML += `<button class="btn-pagination" onclick="cambiarPagina(${totalPages})">${totalPages}</button>`;
                }
                
                // Botón siguiente
                if (currentPage < totalPages) {
                    paginacionHTML += `<button class="btn-pagination" onclick="cambiarPagina(${currentPage + 1})" title="Página siguiente">
                        <i class="bi bi-chevron-right"></i>
                    </button>`;
                }
                
                // Botón última página
                if (currentPage < totalPages) {
                    paginacionHTML += `<button class="btn-pagination" onclick="cambiarPagina(${totalPages})" title="Última página">
                        <i class="bi bi-chevron-double-right"></i>
                    </button>`;
                }
                
                paginacionHTML += '</div>';
            } else if (totalRegistros > 0) {
                paginacionHTML = `<div class="pagination-info">
                    Mostrando <strong>${totalRegistros}</strong> alumno${totalRegistros !== 1 ? 's' : ''}
                </div>`;
            }
            
            document.getElementById("paginacion").innerHTML = paginacionHTML;
        }

        function cambiarPagina(pagina) {
            if (pagina < 1 || pagina > totalPages) return;
            
            currentPage = pagina;
            cargarAlumnos();
            
            // Scroll suave hacia arriba
            window.scrollTo({ 
                top: document.querySelector('.table-container').offsetTop - 100, 
                behavior: 'smooth' 
            });
        }

        function mostrarMensajeError(mensaje) {
            // Puedes implementar una notificación toast aquí
            console.error(mensaje);
        }

        // Carga inicial de alumnos al cargar la página
        document.addEventListener("DOMContentLoaded", cargarAlumnos);

        // Escucha eventos de los filtros con debounce para búsqueda
        let searchTimeout;
        document.getElementById("busqueda").addEventListener("keyup", function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                cargarAlumnos();
            }, 300);
        });

        document.getElementById("idfacultades").addEventListener("change", function() {
            currentPage = 1;
            cargarAlumnos();
        });

        document.getElementById("sexoFiltro").addEventListener("change", function() {
            currentPage = 1;
            cargarAlumnos();
        });
    </script>

<script>
function abrirEditar(matricula) {
    document.getElementById('editarAlert').className = 'alert d-none';
    fetch(`obtener-alumno.php?matricula=${encodeURIComponent(matricula)}`)
        .then(r => r.json())
        .then(d => {
            if (d.error) { alert(d.error); return; }
            document.getElementById('editMatricula').value     = d.matricula_alum;
            document.getElementById('editMatriculaShow').value = d.matricula_alum;
            document.getElementById('editNombres').value       = d.nombres_alum     || '';
            document.getElementById('editApepa').value         = d.ape_paterno_alum || '';
            document.getElementById('editApema').value         = d.ape_materno_alum || '';
            document.getElementById('editCorreo').value        = d.correo_alum      || '';
            document.getElementById('editSexo').value          = d.sexo             || '';
            document.getElementById('editGeneracion').value    = d.generacion       || '';
            document.getElementById('editTipoSangre').value    = d.tipo_sangre      || '';
            document.getElementById('editEmergencia').value    = d.emergencia       || '';
            document.getElementById('editNss').value           = d.nss              || '';
            new bootstrap.Modal(document.getElementById('modalEditar')).show();
        })
        .catch(() => alert('Error al cargar datos del alumno'));
}

document.getElementById('btnGuardarEditar').addEventListener('click', function () {
    const btn = this;
    const alerta = document.getElementById('editarAlert');
    alerta.className = 'alert d-none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Guardando...';

    fetch('actualizar-alumno.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            matricula:   document.getElementById('editMatricula').value,
            nombres:     document.getElementById('editNombres').value,
            ape_paterno: document.getElementById('editApepa').value,
            ape_materno: document.getElementById('editApema').value,
            correo:      document.getElementById('editCorreo').value,
            sexo:        document.getElementById('editSexo').value,
            generacion:  document.getElementById('editGeneracion').value,
            tipo_sangre: document.getElementById('editTipoSangre').value,
            emergencia:  document.getElementById('editEmergencia').value,
            nss:         document.getElementById('editNss').value,
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alerta.className = 'alert alert-success';
            alerta.textContent = data.message;
            setTimeout(() => {
                bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
                cargarAlumnos();
            }, 1200);
        } else {
            alerta.className = 'alert alert-danger';
            alerta.textContent = data.error || 'Error al guardar.';
        }
    })
    .catch(() => {
        alerta.className = 'alert alert-danger';
        alerta.textContent = 'Error de conexión. Intente de nuevo.';
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> Guardar cambios';
    });
});
</script>
