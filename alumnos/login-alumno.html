<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSalud – Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="imagenes/unisalud-sf.png">
    <link rel="stylesheet" href="login.css">
    <style>
        .otp-input {
            letter-spacing: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
        }
        .correo-hint {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin: 8px 0 16px;
        }
        .dev-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #856404;
        }
        .dev-banner strong { font-size: 1.5rem; letter-spacing: 6px; display: block; margin-top: 4px; }
        .btn-back {
            background: none;
            border: none;
            color: #003da5;
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
            text-decoration: underline;
        }
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
        }
        .step-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .step-dot.active { background: #003da5; }
    </style>
</head>
<body>

    <div class="brand-section">
        <div class="brand-content">
            <img src="imagenes/unisalud-sf.png" alt="UniSalud" class="brand-logo">
            <h2>Bienvenido al Portal de Estudiantes</h2>
            <p>Gestiona tu información de salud, resultados de cuestionarios y datos de emergencia.</p>
        </div>
    </div>

    <div class="login-section">
        <div class="login-header">
            <h1>Iniciar Sesión</h1>
        </div>

        <div id="alerta" class="alert" style="display:none;"></div>

        <!-- ── PASO 1: Matrícula ── -->
        <div id="paso1">
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <span>Paso 1 de 2 — Ingresa tu matrícula</span>
            </div>

            <form id="formMatricula">
                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <div class="input-wrapper">
                        <input type="text" id="matricula" name="matricula"
                               placeholder="Ej. 123456" required autocomplete="username">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btnEnviar">
                    Enviar código de acceso
                </button>
            </form>
        </div>

        <!-- ── PASO 2: Código OTP ── -->
        <div id="paso2" style="display:none;">
            <div class="step-indicator">
                <div class="step-dot"></div>
                <div class="step-dot active"></div>
                <span>Paso 2 de 2 — Ingresa el código</span>
            </div>

            <div id="devBanner" class="dev-banner" style="display:none;">
                ⚠️ Modo desarrollo — código generado:
                <strong id="devCodigo"></strong>
            </div>

            <p class="correo-hint" id="correoHint"></p>

            <form id="formOtp">
                <div class="form-group">
                    <label for="codigo">Código de verificación</label>
                    <div class="input-wrapper">
                        <input type="text" id="codigo" name="codigo"
                               class="otp-input" placeholder="000000"
                               maxlength="6" required autocomplete="one-time-code">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btnVerificar">
                    Acceder al Portal
                </button>
            </form>

            <div style="text-align:center; margin-top:12px;">
                <button class="btn-back" onclick="volverPaso1()">← Cambiar matrícula</button>
                &nbsp;·&nbsp;
                <button class="btn-back" id="btnReenviar" onclick="reenviarCodigo()">Reenviar código</button>
            </div>
        </div>

        <div class="help-text" style="margin-top:20px;">
            ¿No tienes cuenta activa? <a href="../cuestionarios/registro.html">Solicitar registro</a>
        </div>
    </div>

    <script>
        let matriculaActual = '';

        // Convertir matrícula a mayúsculas
        document.getElementById('matricula').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        // Solo números en el código OTP
        document.getElementById('codigo').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });

        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.getElementById('alerta');
            alerta.className = 'alert alert-' + tipo;
            alerta.textContent = mensaje;
            alerta.style.display = 'block';
            setTimeout(() => alerta.style.display = 'none', 6000);
        }

        function setLoading(btnId, loading, textoOriginal) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.innerText = loading ? 'Cargando...' : textoOriginal;
        }

        // ── PASO 1: Enviar matrícula ──────────────────────────────────────
        document.getElementById('formMatricula').addEventListener('submit', async function(e) {
            e.preventDefault();
            const matricula = document.getElementById('matricula').value.trim();
            if (!matricula) { mostrarAlerta('Ingresa tu matrícula', 'error'); return; }

            setLoading('btnEnviar', true, 'Enviar código de acceso');

            try {
                const fd = new FormData();
                fd.append('matricula', matricula);
                const res  = await fetch('enviar-otp.php', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.error) {
                    mostrarAlerta(data.error, 'error');
                } else {
                    matriculaActual = matricula;
                    // Mostrar paso 2
                    document.getElementById('paso1').style.display = 'none';
                    document.getElementById('paso2').style.display = 'block';
                    document.getElementById('alerta').style.display = 'none';

                    // Hint del correo
                    document.getElementById('correoHint').textContent =
                        'Código enviado a ' + data.correo + ' (válido 10 min)';

                    // Banner modo dev
                    if (data.dev_codigo) {
                        document.getElementById('devCodigo').textContent = data.dev_codigo;
                        document.getElementById('devBanner').style.display = 'block';
                    }

                    document.getElementById('codigo').focus();
                }
            } catch (err) {
                mostrarAlerta('Error de conexión. Intenta de nuevo.', 'error');
            }

            setLoading('btnEnviar', false, 'Enviar código de acceso');
        });

        // ── PASO 2: Verificar OTP ─────────────────────────────────────────
        document.getElementById('formOtp').addEventListener('submit', async function(e) {
            e.preventDefault();
            const codigo = document.getElementById('codigo').value.trim();
            if (codigo.length !== 6) { mostrarAlerta('El código debe tener 6 dígitos', 'error'); return; }

            setLoading('btnVerificar', true, 'Acceder al Portal');

            try {
                const fd = new FormData();
                fd.append('matricula', matriculaActual);
                fd.append('codigo', codigo);
                const res  = await fetch('verificar-otp.php', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.success) {
                    mostrarAlerta('Acceso correcto. Redirigiendo...', 'success');
                    setTimeout(() => window.location.href = 'inicio.php', 1000);
                } else {
                    mostrarAlerta(data.error, 'error');
                    setLoading('btnVerificar', false, 'Acceder al Portal');
                }
            } catch (err) {
                mostrarAlerta('Error de conexión. Intenta de nuevo.', 'error');
                setLoading('btnVerificar', false, 'Acceder al Portal');
            }
        });

        function volverPaso1() {
            document.getElementById('paso2').style.display = 'none';
            document.getElementById('paso1').style.display = 'block';
            document.getElementById('codigo').value = '';
            document.getElementById('devBanner').style.display = 'none';
            document.getElementById('alerta').style.display = 'none';
        }

        function reenviarCodigo() {
            document.getElementById('codigo').value = '';
            document.getElementById('devBanner').style.display = 'none';
            document.getElementById('formMatricula').dispatchEvent(new Event('submit'));
            // Simular envío con matrícula actual
            const fd = new FormData();
            fd.append('matricula', matriculaActual);
            document.getElementById('btnReenviar').disabled = true;
            fetch('enviar-otp.php', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.error) { mostrarAlerta(data.error, 'error'); }
                    else {
                        mostrarAlerta('Nuevo código enviado', 'success');
                        if (data.dev_codigo) {
                            document.getElementById('devCodigo').textContent = data.dev_codigo;
                            document.getElementById('devBanner').style.display = 'block';
                        }
                    }
                    document.getElementById('btnReenviar').disabled = false;
                });
        }
    </script>
</body>
</html>
