<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PEPS-1 · Vista Previa Interactiva</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── SELECTOR DE ESTILO (barra flotante) ── */
#style-switcher{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);
    z-index:9999;display:flex;gap:8px;background:rgba(0,0,0,.55);
    backdrop-filter:blur(10px);padding:8px 12px;border-radius:50px;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
}
#style-switcher button{
    font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;
    padding:6px 16px;border-radius:50px;border:2px solid transparent;
    cursor:pointer;transition:all .2s;white-space:nowrap;
}
#style-switcher button.active{border-color:white;}
#style-switcher button:not(.active){background:transparent;color:rgba(255,255,255,.7);}

/* ══════════════════════════════════════════════
   ESTILO 1 — TYPEFORM (fondo azul degradado)
══════════════════════════════════════════════ */
body.s1{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#003da5 0%,#0056e0 100%);
    min-height:100vh;color:white;overflow-x:hidden;
}
body.s1 .wrap{max-width:680px;margin:0 auto;padding:60px 20px 40px;}

/* progress */
body.s1 .prog-bar{position:fixed;top:0;left:0;width:100%;height:5px;background:rgba(255,255,255,.2);}
body.s1 .prog-fill{height:100%;background:#ffd100;transition:width .4s ease;border-radius:0 3px 3px 0;}
body.s1 .prog-label{position:fixed;top:10px;right:18px;font-size:12px;font-weight:600;
    background:rgba(255,255,255,.15);padding:3px 12px;border-radius:20px;color:rgba(255,255,255,.9);}

/* badge */
body.s1 .badge-sec{display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);
    font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;
    margin-bottom:22px;letter-spacing:.5px;text-transform:uppercase;}

/* pregunta */
body.s1 .q-num{font-size:13px;font-weight:600;color:#ffd100;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
body.s1 .q-text{font-size:clamp(1.1rem,3vw,1.4rem);font-weight:600;line-height:1.5;margin-bottom:34px;}

/* opciones */
body.s1 .opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:480px){body.s1 .opts{grid-template-columns:1fr;}}
body.s1 .opt{
    background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);
    color:white;border-radius:14px;padding:18px 16px;
    font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:500;
    cursor:pointer;transition:all .2s;text-align:left;
    display:flex;align-items:center;gap:12px;backdrop-filter:blur(6px);
}
body.s1 .opt:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5);transform:translateY(-2px);}
body.s1 .opt.sel{background:#ffd100;border-color:#ffd100;color:#003da5;font-weight:700;
    transform:scale(1.03);box-shadow:0 8px 24px rgba(255,209,0,.4);}
body.s1 .opt .kb{background:rgba(255,255,255,.25);width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
body.s1 .opt.sel .kb{background:rgba(0,61,165,.15);}

/* navegación */
body.s1 .navs{display:flex;gap:12px;margin-top:28px;}
body.s1 .btn-n{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
    color:white;font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600;
    padding:10px 22px;border-radius:50px;cursor:pointer;transition:all .2s;}
body.s1 .btn-n:hover{background:rgba(255,255,255,.25);}
body.s1 .btn-n.prim{background:#ffd100;border-color:#ffd100;color:#003da5;}
body.s1 .btn-n.prim:hover{background:#ffe033;}

/* ══════════════════════════════════════════════
   ESTILO 2 — TARJETAS CLARAS (fondo blanco)
══════════════════════════════════════════════ */
body.s2{
    font-family:'Poppins',sans-serif;
    background:#f0f4ff;min-height:100vh;color:#1f2937;overflow-x:hidden;
}
body.s2 .wrap{max-width:680px;margin:0 auto;padding:70px 20px 40px;}

body.s2 .prog-bar{position:fixed;top:0;left:0;width:100%;height:6px;background:#e5e7eb;}
body.s2 .prog-fill{height:100%;background:linear-gradient(90deg,#003da5,#3b82f6);transition:width .4s;border-radius:0 4px 4px 0;}
body.s2 .prog-label{position:fixed;top:14px;right:18px;font-size:12px;font-weight:600;color:#6b7280;}

body.s2 .badge-sec{display:inline-flex;align-items:center;gap:6px;
    background:#dbeafe;color:#1e40af;font-size:12px;font-weight:700;
    padding:5px 14px;border-radius:20px;margin-bottom:22px;letter-spacing:.5px;text-transform:uppercase;}

body.s2 .card-q{
    background:white;border-radius:20px;padding:36px 32px;
    box-shadow:0 4px 24px rgba(30,64,175,.08);
    border:1px solid #e0e7ff;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

body.s2 .q-num{font-size:12px;font-weight:700;color:#6b7280;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
body.s2 .q-text{font-size:clamp(1rem,2.5vw,1.3rem);font-weight:600;line-height:1.5;margin-bottom:28px;color:#111827;}

body.s2 .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){body.s2 .opts{grid-template-columns:1fr;}}
body.s2 .opt{
    background:#f8faff;border:2px solid #e0e7ff;color:#374151;
    border-radius:12px;padding:16px 14px;
    font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:500;
    cursor:pointer;transition:all .2s;text-align:left;
    display:flex;align-items:center;gap:10px;
}
body.s2 .opt:hover{border-color:#93c5fd;background:#eff6ff;transform:translateY(-2px);}
body.s2 .opt.sel{background:#1e40af;border-color:#1e40af;color:white;font-weight:700;
    box-shadow:0 6px 20px rgba(30,64,175,.3);}
body.s2 .opt .kb{background:rgba(0,0,0,.07);width:24px;height:24px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
body.s2 .opt.sel .kb{background:rgba(255,255,255,.2);}

body.s2 .navs{display:flex;gap:12px;margin-top:24px;}
body.s2 .btn-n{background:white;border:2px solid #d1d5db;color:#374151;
    font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600;
    padding:10px 22px;border-radius:50px;cursor:pointer;transition:all .2s;}
body.s2 .btn-n:hover{border-color:#93c5fd;color:#1e40af;}
body.s2 .btn-n.prim{background:#1e40af;border-color:#1e40af;color:white;}
body.s2 .btn-n.prim:hover{background:#1e3a8a;}

/* ══════════════════════════════════════════════
   ESTILO 3 — OSCURO MODERNO (dark mode)
══════════════════════════════════════════════ */
body.s3{
    font-family:'Poppins',sans-serif;
    background:#0f172a;min-height:100vh;color:#e2e8f0;overflow-x:hidden;
}
body.s3 .wrap{max-width:680px;margin:0 auto;padding:70px 20px 40px;}

body.s3 .prog-bar{position:fixed;top:0;left:0;width:100%;height:5px;background:#1e293b;}
body.s3 .prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .4s;border-radius:0 4px 4px 0;}
body.s3 .prog-label{position:fixed;top:12px;right:18px;font-size:12px;font-weight:600;
    background:#1e293b;color:#94a3b8;padding:3px 12px;border-radius:20px;}

body.s3 .badge-sec{display:inline-flex;align-items:center;gap:6px;
    background:#1e293b;color:#a5b4fc;font-size:12px;font-weight:600;
    padding:5px 14px;border-radius:20px;margin-bottom:22px;letter-spacing:.5px;text-transform:uppercase;}

body.s3 .q-num{font-size:13px;font-weight:600;color:#6366f1;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
body.s3 .q-text{font-size:clamp(1.1rem,3vw,1.4rem);font-weight:600;line-height:1.5;margin-bottom:34px;color:#f1f5f9;}

body.s3 .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){body.s3 .opts{grid-template-columns:1fr;}}
body.s3 .opt{
    background:#1e293b;border:2px solid #334155;color:#cbd5e1;
    border-radius:14px;padding:18px 16px;
    font-family:'Poppins',sans-serif;font-size:.93rem;font-weight:500;
    cursor:pointer;transition:all .2s;text-align:left;
    display:flex;align-items:center;gap:12px;
}
body.s3 .opt:hover{border-color:#6366f1;background:#1e2a4a;transform:translateY(-2px);}
body.s3 .opt.sel{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:#6366f1;
    color:white;font-weight:700;box-shadow:0 8px 24px rgba(99,102,241,.35);}
body.s3 .opt .kb{background:rgba(255,255,255,.08);width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
body.s3 .opt.sel .kb{background:rgba(255,255,255,.2);}

body.s3 .navs{display:flex;gap:12px;margin-top:28px;}
body.s3 .btn-n{background:#1e293b;border:2px solid #334155;color:#94a3b8;
    font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600;
    padding:10px 22px;border-radius:50px;cursor:pointer;transition:all .2s;}
body.s3 .btn-n:hover{border-color:#6366f1;color:#a5b4fc;}
body.s3 .btn-n.prim{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:#6366f1;color:white;}
body.s3 .btn-n.prim:hover{opacity:.9;}

/* ══════════════════════════════════════════════
   ESTILO 4 — GRADIENT SUNSET (Naranja/Rosa)
══════════════════════════════════════════════ */
body.s4{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#f97316 0%,#ec4899 100%);
    min-height:100vh;color:white;overflow-x:hidden;
}
body.s4 .wrap{max-width:680px;margin:0 auto;padding:60px 20px 40px;}

body.s4 .prog-bar{position:fixed;top:0;left:0;width:100%;height:5px;background:rgba(255,255,255,.2);}
body.s4 .prog-fill{height:100%;background:white;transition:width .4s;border-radius:0 3px 3px 0;}
body.s4 .prog-label{position:fixed;top:10px;right:18px;font-size:12px;font-weight:600;
    background:rgba(255,255,255,.2);padding:3px 12px;border-radius:20px;color:white;}

body.s4 .badge-sec{display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.2);color:white;font-size:12px;font-weight:600;
    padding:5px 14px;border-radius:20px;margin-bottom:22px;letter-spacing:.5px;text-transform:uppercase;}

body.s4 .q-num{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
body.s4 .q-text{font-size:clamp(1.1rem,3vw,1.4rem);font-weight:700;line-height:1.5;margin-bottom:34px;}

body.s4 .opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:480px){body.s4 .opts{grid-template-columns:1fr;}}
body.s4 .opt{
    background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
    color:white;border-radius:16px;padding:18px 16px;
    font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:500;
    cursor:pointer;transition:all .2s;text-align:left;
    display:flex;align-items:center;gap:12px;backdrop-filter:blur(8px);
}
body.s4 .opt:hover{background:rgba(255,255,255,.27);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.15);}
body.s4 .opt.sel{background:white;border-color:white;color:#f97316;font-weight:700;
    box-shadow:0 8px 28px rgba(0,0,0,.2);}
body.s4 .opt .kb{background:rgba(255,255,255,.25);width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
body.s4 .opt.sel .kb{background:rgba(249,115,22,.15);}

body.s4 .navs{display:flex;gap:12px;margin-top:28px;}
body.s4 .btn-n{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.35);
    color:white;font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:600;
    padding:10px 22px;border-radius:50px;cursor:pointer;transition:all .2s;}
body.s4 .btn-n:hover{background:rgba(255,255,255,.28);}
body.s4 .btn-n.prim{background:white;border-color:white;color:#f97316;}
body.s4 .btn-n.prim:hover{background:rgba(255,255,255,.92);}

/* ── LABEL DE ESTILO ── */
.style-label{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
    color:rgba(255,255,255,.8);font-size:11px;font-weight:600;
    padding:6px 18px;border-radius:20px;pointer-events:none;
    letter-spacing:.5px;text-transform:uppercase;
}
</style>
</head>
<body class="s1">

<!-- Selector de estilo -->
<div id="style-switcher">
    <button onclick="setStyle(1)" class="active" id="sb1" style="background:#003da5;color:white;">🔵 Azul UNACAR</button>
    <button onclick="setStyle(2)" id="sb2" style="color:rgba(255,255,255,.7);">⬜ Tarjetas Claras</button>
    <button onclick="setStyle(3)" id="sb3" style="color:rgba(255,255,255,.7);">🌙 Dark Mode</button>
    <button onclick="setStyle(4)" id="sb4" style="color:rgba(255,255,255,.7);">🌅 Sunset</button>
</div>

<!-- Barra de progreso -->
<div class="prog-bar"><div class="prog-fill" id="prog" style="width:16%"></div></div>
<div class="prog-label" id="prog-lbl">8 / 48</div>

<div class="wrap" id="wrap">
    <!-- Contenido inyectado por JS -->
</div>

<div class="style-label" id="style-label">Estilo 1 · Azul UNACAR</div>

<script>
const SECCIONES = [
    {emoji:'🥗',nombre:'Nutrición',color:'#16a34a'},
    {emoji:'🏃',nombre:'Ejercicio',color:'#dc2626'},
    {emoji:'🩺',nombre:'Responsabilidad en Salud',color:'#0369a1'},
    {emoji:'🤝',nombre:'Soporte Interpersonal',color:'#7c3aed'},
    {emoji:'🧘',nombre:'Manejo de Estrés',color:'#b45309'},
    {emoji:'✨',nombre:'Autoactualizacion',color:'#be185d'},
];

// Pregunta demo fija (para visualizar)
const DEMO = {
    secIdx: 0,
    num: 8,
    total: 48,
    answered: 8,
    text: 'Eres entusiasta y optimista con referencia a tu vida',
    selected: null,
};

const OPCIONES = ['Nunca','A veces','Frecuentemente','Rutinariamente'];

let currentStyle = 1;
const styleNames = ['','Azul UNACAR','Tarjetas Claras','Dark Mode','Sunset'];
const styleEmojis = ['','🔵','⬜','🌙','🌅'];

function render() {
    const sec = SECCIONES[DEMO.secIdx];
    const isCard = currentStyle === 2;

    const inner = `
        <div class="badge-sec">${sec.emoji} &nbsp;${sec.nombre}</div>
        <div class="q-num">Pregunta ${DEMO.num} de ${DEMO.total}</div>
        ${isCard
            ? `<div class="card-q"><div class="q-text">${DEMO.text}</div><div class="opts" id="opts">${renderOpts()}</div></div>`
            : `<div class="q-text">${DEMO.text}</div><div class="opts" id="opts">${renderOpts()}</div>`
        }
        <div class="navs">
            <button class="btn-n" onclick="prevQ()">← Atrás</button>
            <button class="btn-n prim" id="btn-next" onclick="nextQ()" ${DEMO.selected===null?'disabled':''}>
                Siguiente →
            </button>
        </div>
        <p style="margin-top:18px;font-size:11.5px;opacity:.5;text-align:center;">
            Tip: presiona <strong>1 2 3 4</strong> en tu teclado · ← → para navegar
        </p>`;

    document.getElementById('wrap').innerHTML = inner;
    updateProgress();
}

function renderOpts() {
    return OPCIONES.map((label,i) => `
        <button class="opt${DEMO.selected===i+1?' sel':''}" onclick="selectOpt(${i+1})">
            <span class="kb">${i+1}</span>${label}
        </button>`).join('');
}

function selectOpt(val) {
    DEMO.selected = val;
    DEMO.answered = Math.max(DEMO.answered, DEMO.num);
    render();
    // auto-avanza demo
    setTimeout(nextQ, 420);
}

function nextQ() {
    if(DEMO.num < 48) {
        DEMO.num++;
        DEMO.secIdx = DEMO.num <= 6 ? 0 : DEMO.num <= 11 ? 1 : DEMO.num <= 21 ? 2 : DEMO.num <= 28 ? 3 : DEMO.num <= 36 ? 4 : 5;
        DEMO.selected = null;
        DEMO.answered = DEMO.num - 1;
        render();
    }
}
function prevQ() {
    if(DEMO.num > 1) {
        DEMO.num--;
        DEMO.secIdx = DEMO.num <= 6 ? 0 : DEMO.num <= 11 ? 1 : DEMO.num <= 21 ? 2 : DEMO.num <= 28 ? 3 : DEMO.num <= 36 ? 4 : 5;
        DEMO.selected = null;
        DEMO.answered = DEMO.num - 1;
        render();
    }
}

function updateProgress(){
    const pct = ((DEMO.num-1)/48)*100;
    document.getElementById('prog').style.width = pct+'%';
    document.getElementById('prog-lbl').textContent = (DEMO.num-1)+' / 48';
}

function setStyle(n) {
    currentStyle = n;
    document.body.className = 's'+n;
    // actualizar botones del switcher
    for(let i=1;i<=4;i++){
        const b = document.getElementById('sb'+i);
        b.classList.toggle('active', i===n);
    }
    const labels = ['','Azul UNACAR','Tarjetas Claras','Dark Mode','Sunset'];
    document.getElementById('style-label').textContent = `Estilo ${n} · ${labels[n]}`;
    render();
}

document.addEventListener('keydown', e=>{
    const v = parseInt(e.key);
    if(v>=1&&v<=4){selectOpt(v);return;}
    if(e.key==='ArrowRight') nextQ();
    if(e.key==='ArrowLeft') prevQ();
    // cambiar estilo con F1-F4
    if(e.key==='F1'){e.preventDefault();setStyle(1);}
    if(e.key==='F2'){e.preventDefault();setStyle(2);}
    if(e.key==='F3'){e.preventDefault();setStyle(3);}
    if(e.key==='F4'){e.preventDefault();setStyle(4);}
});

// render inicial
render();
</script>
</body>
</html>
